<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - OmniCampus</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join OmniCampus today</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="Enter your first name" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" placeholder="Enter your last name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" placeholder="Enter your student ID" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                    <small>Minimum 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="btn-auth">Register</button>
            </form>
            
            <div id="registerStatus" class="auth-status"></div>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
                <p><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const statusDiv = document.getElementById('registerStatus');
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const studentId = document.getElementById('studentId').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Clear previous status
            statusDiv.className = 'auth-status';
            statusDiv.innerHTML = '';
            
            // Validation
            if (!firstName || !lastName || !studentId || !email || !phone || !password) {
                statusDiv.className = 'auth-status error show';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> All fields are required';
                return;
            }
            
            if (password !== confirmPassword) {
                statusDiv.className = 'auth-status error show';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                statusDiv.className = 'auth-status error show';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Password must be at least 6 characters';
                return;
            }
            
            // Show loading
            statusDiv.className = 'auth-status show';
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            try {
                console.log('Attempting registration with:', { 
                    student_id: studentId,
                    first_name: firstName,
                    last_name: lastName,
                    email: email,
                    phone: phone
                });
                
                const response = await fetch(`${API_BASE}/student/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        student_id: studentId,
                        first_name: firstName,
                        last_name: lastName,
                        email: email,
                        phone: phone,
                        password: password
                    })
                });
                
                const data = await response.json();
                console.log('Registration response:', data);
                
                if (response.ok) {
                    // Auto login after registration
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('omnicampus_user', JSON.stringify({
                        id: data.id,
                        name: `${firstName} ${lastName}`,
                        studentId: studentId,
                        email: email,
                        role: 'student'
                    }));
                    localStorage.setItem('omnicampus_logged_in', 'true');
                    localStorage.setItem('omnicampus_login_time', Date.now().toString());
                    
                    statusDiv.className = 'auth-status success show';
                    statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Registration successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    statusDiv.className = 'auth-status error show';
                    statusDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${data.error || 'Registration failed'}`;
                }
            } catch (error) {
                console.error('Registration error:', error);
                statusDiv.className = 'auth-status error show';
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Connection error. Please make sure the server is running.';
            }
        });
    </script>
</body>
</html>
